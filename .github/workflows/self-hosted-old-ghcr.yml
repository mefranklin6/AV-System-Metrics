name: Legacy Self-Hosted GHCR

on:
  push:
    paths:
      - "Self_Hosted_OLD/**"
      - ".github/workflows/self-hosted-old-ghcr.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: self-hosted-old-ghcr-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_SUFFIX: legacy-metrics-ingest

jobs:
  build-and-publish:
    name: Build and publish legacy adapter image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ./Self_Hosted_OLD/go.mod
          cache-dependency-path: ./Self_Hosted_OLD/go.sum

      - name: Test Go service
        working-directory: ./Self_Hosted_OLD
        run: go test ./...

      - name: Normalize image name
        id: image
        shell: bash
        run: |
          repository="${GITHUB_REPOSITORY,,}"
          echo "name=${REGISTRY}/${repository}/${IMAGE_SUFFIX}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: ./Self_Hosted_OLD
          file: ./Self_Hosted_OLD/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
